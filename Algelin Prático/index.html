<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calendário Interativo — Setembro, Outubro e Novembro 2025</title>
  <style>
    :root {
        --bg: #ffffff;       /* fundo principal branco */
        --card: #f9f9f9;     /* cor dos cartões */
        --muted: #6b7280;    /* cinza para textos secundários */
        --text: #111827;     /* texto principal bem escuro */
        --accent: #2563eb;   /* azul para destaque */
        --selected: #f59e0b; /* laranja para seleção */
        --border: #d1d5db;   /* borda cinza clara */
        --lesson: #3b82f6;   /* azul aulas */
        --exam: #ef4444;     /* vermelho provas */
        --holiday: #606060;  /* cinza feriado */
    }

    body {
        margin: 0;
        padding: 24px;
        font-family: system-ui, sans-serif;
        background: #ffffff;      /* fundo branco sólido */
        color: var(--text);
        display: grid;
        place-items: center center;
        min-height: 100vh;
    }

    .calendar-container {
        display: flex;
        flex-direction: column;
        align-items: center;  /* centraliza horizontalmente */
        justify-content: center;
    }

    
    * { box-sizing: border-box; }
    .app {
      width: min(980px, 96vw);
      display: grid; gap: 16px;
    }
    .months {
        display: grid; gap: 16px;
        grid-template-columns: repeat(1, minmax(0, 1fr));
    }
    @media (max-width: 500px) {
        body {
            font-size: 12px; /* texto menor */
        }
        .calendar {
            gap: 8px; /* menos espaço */
        }
        .day {
            padding: 4px; /* botões menores */
        }
    }    
    @media (min-width: 600px) and (max-width: 899px) {
        .months { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 900px) {
        .months { grid-template-columns: repeat(3, 1fr); }
    }

    .month-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border: 1px solid var(--border); border-radius: 18px; padding: 12px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.097);
    }
    .month-header { display: flex; justify-content: space-between; padding: 6px 8px 10px 8px; }
    .month-title { font-size: 18px; font-weight: 800; }
    .year { font-size: 12px; color: var(--muted); }
    .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; padding: 8px; }
    .dow { text-align: center; font-size: 12px; color: var(--muted); font-weight: 700; padding: 6px 0; }
    .cell {
      aspect-ratio: 1/1; display: grid; place-items: center; font-weight: 700;
      border-radius: 12px; border: 1px solid var(--border); cursor: pointer;
      background: #ececec; user-select: none;
    }
    .cell.empty { background: transparent; border-style: dashed; opacity: .35; cursor: default; }
    .cell.lesson { background: var(--lesson); color: #fff; }
    .cell.exam { background: var(--exam); color: #fff; }
    .cell.holiday { background: var(--holiday); color: #fff; }
    .cell.selected { outline: 2px solid var(--selected); }
    .legend { font-size: 14px; color: var(--muted); display: flex; gap: 12px; padding: 4px 8px 8px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .dot.lesson { background: var(--lesson); }
    .dot.exam { background: var(--exam); }
    .dot.holiday { background: var(--holiday); }
    .selection { font-size: 16px; color: var(--muted); text-align: center; }
    .selection strong { color: var(--text); }
  </style>
</head>
<body>
  <div class="app">
    <div class="months" id="months"></div>
    <div class="selection" id="selectionMsg">Nenhuma data selecionada.</div>
  </div>

  <script>
    const PT = new Intl.DateTimeFormat('pt-BR', { dateStyle: 'full' });
    const monthNames = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    const dow = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];

    const state = {
      year: 2025,
      months: [8, 9, 10],
      selectedISO: null,
    };

    const lessons = {
      '2025-09-13': '1ª Aula',
      '2025-09-20': '2ª Aula',
      '2025-09-27': '3ª Aula',
      '2025-10-04': '4ª Aula',
      '2025-10-11': '5ª Aula',
      '2025-10-18': '6ª Aula',
      '2025-10-25': 'Prova',
      '2025-11-01': '7ª Aula',
      '2025-11-08': '8ª Aula',
      '2025-11-15': 'Feriado',
      '2025-11-22': 'Feriado',
      '2025-11-29': '9ª Aula',
    };

    const monthsContainer = document.getElementById('months');
    const selectionMsg = document.getElementById('selectionMsg');

    function daysInMonth(year, month) {
      return new Date(year, month + 1, 0).getDate();
    }
    function mondayAlignedOffset(year, month) {
      const js = new Date(year, month, 1).getDay();
      return (js + 6) % 7;
    }
    function isToday(y, m, d) {
      const t = new Date();
      return y === t.getFullYear() && m === t.getMonth() && d === t.getDate();
    }
    function fmtISO(y, m, d) {
      return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    }

    function render() {
      monthsContainer.innerHTML = '';
      for (const m of state.months) {
        monthsContainer.appendChild(renderMonthCard(state.year, m));
      }
      updateSelectionMsg();
    }

    function findInMonth(month, event) {
        // percorre todas as chaves do objeto lessons
        for (const isoDate in lessons) {
            const [y, m, d] = isoDate.split('-').map(Number);
            if (m - 1 === month && lessons[isoDate] === event) {
                return true;
            }
        }
        return false; 
    }

    function renderMonthCard(year, month) {
      const card = document.createElement('section');
      card.className = 'month-card';

      const header = document.createElement('div');
      header.className = 'month-header';
      header.innerHTML = `<div class="month-title">${monthNames[month]}</div><div class="year">${year}</div>`;
      card.appendChild(header);

      const grid = document.createElement('div');
      grid.className = 'grid';
      for (const d of dow) {
        const e = document.createElement('div');
        e.className = 'dow'; e.textContent = d; grid.appendChild(e);
      }

      const offset = mondayAlignedOffset(year, month);
      for (let i = 0; i < offset; i++) {
        const empty = document.createElement('div');
        empty.className = 'cell empty';
        grid.appendChild(empty);
      }

      const dim = daysInMonth(year, month);
      for (let day = 1; day <= dim; day++) {
        const cell = document.createElement('button');
        cell.className = 'cell';
        cell.textContent = day;

        if (isToday(year, month, day)) cell.classList.add('today');
        const iso = fmtISO(year, month, day);
        if (lessons[iso]) {
          if (lessons[iso] === 'Prova') {
            cell.classList.add('exam');
          } else if (lessons[iso].includes('Aula')){
            cell.classList.add('lesson');
          }
          else{
            cell.classList.add('holiday');
          }
        }

        cell.addEventListener('click', () => {
          state.selectedISO = iso;
          document.querySelectorAll('.cell.selected').forEach(el => el.classList.remove('selected'));
          cell.classList.add('selected');
          updateSelectionMsg();
        });

        grid.appendChild(cell);
      }

      card.appendChild(grid);
      const legend = document.createElement('div');
      legend.className = 'legend';
      let legendHTML = `
        <span><span class="dot lesson"></span>Aula</span>
      `;

      if(findInMonth(month, 'Prova')){
        legendHTML += `<span><span class="dot exam"></span>2ª Fase OBMEP</span>`;
      }

      if(findInMonth(month, 'Feriado')){
        legendHTML += `<span><span class="dot holiday"></span>Feriado - Sem aula</span>`;
      }
      
      legend.innerHTML = legendHTML;

      card.appendChild(legend);
      return card;
    }

    function updateSelectionMsg() {
      if (!state.selectedISO) {
        selectionMsg.textContent = 'Nenhuma data selecionada.';
      } else {
        const [y, mo, d] = state.selectedISO.split('-').map(Number);
        const date = new Date(y, mo - 1, d);
        const desc = lessons[state.selectedISO] ? ` — ${lessons[state.selectedISO]}` : '';
        selectionMsg.innerHTML = `<strong>${PT.format(date)}</strong>${desc}`;
      }
    }

    render();
  </script>
</body>
</html>
